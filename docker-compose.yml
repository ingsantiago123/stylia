version: "3.8"

services:
  # =============================================
  # Base de datos
  # =============================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stylecorrector
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: stylecorrector
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylecorrector"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # =============================================
  # pgAdmin (interfaz gráfica para PostgreSQL)
  # =============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@stylia.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

  # =============================================
  # Redis (broker Celery + caché)
  # =============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # =============================================
  # MinIO (almacenamiento S3-compatible)
  # =============================================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # =============================================
  # LanguageTool (corrector ortográfico/gramatical) — 2 instancias + nginx LB
  # =============================================
  languagetool-1:
    image: erikvl87/languagetool:latest
    environment:
      Java_Xms: 512m
      Java_Xmx: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  languagetool-2:
    image: erikvl87/languagetool:latest
    environment:
      Java_Xms: 512m
      Java_Xmx: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  languagetool:
    image: nginx:alpine
    volumes:
      - ./nginx-lt.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8010:8010"
    depends_on:
      languagetool-1:
        condition: service_healthy
      languagetool-2:
        condition: service_healthy
    restart: unless-stopped

  # =============================================
  # Backend API
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      languagetool-1:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # =============================================
  # Worker para tareas de pipeline (pesadas: LibreOffice, PyMuPDF, análisis, corrección secuencial)
  # =============================================
  worker-pipeline:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      languagetool-1:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_PIPELINE_CONCURRENCY:-4}
      --max-tasks-per-child=10
      --queues=pipeline
      --hostname=pipeline@%h
    volumes:
      - ./backend:/app
      - stylia_tmp:/tmp/stylia
    mem_limit: 4g
    memswap_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d pipeline@$$HOSTNAME 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # =============================================
  # Worker para tareas batch (LLM correction, I/O-bound)
  # =============================================
  worker-batch:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_BATCH_CONCURRENCY:-6}
      --max-tasks-per-child=50
      --queues=batch
      --hostname=batch@%h
    volumes:
      - ./backend:/app
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d batch@$$HOSTNAME 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # =============================================
  # Frontend (Next.js — modo desarrollo para MVP)
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
    environment:
      - WATCHPACK_POLLING=true
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  pgadmin_data:
  stylia_tmp:
